<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sarah Skinsational</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Poppins, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #ffd7e5, #ffe7ef, #fff4f8);
        overflow: hidden;
        padding: 20px;
      }

      body::before {
        content: '';
        position: absolute;
        width: 450px;
        height: 450px;
        background: rgba(255, 255, 255, 0.25);
        border-radius: 50%;
        left: -120px;
        top: -100px;
        filter: blur(50px);
      }

      body::after {
        content: '';
        position: absolute;
        width: 400px;
        height: 400px;
        background: rgba(255, 182, 193, 0.35);
        border-radius: 50%;
        right: -120px;
        bottom: -100px;
        filter: blur(60px);
      }

      .container {
        position: relative;
        width: 100%;
        max-width: 450px;
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(18px);
        padding: 40px;
        border-radius: 40px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.6);
        z-index: 2;
      }

      h1 {
        font-family: 'Playfair Display';
        font-size: 40px;
        color: #db5e87;
        margin-bottom: 10px;
      }

      .subtitle {
        color: #9b6d79;
        font-style: italic;
        margin-bottom: 30px;
      }

      .image-box {
        width: 220px;
        height: 220px;
        margin: auto;
        border-radius: 50%;
        overflow: hidden;
        border: 6px solid #ffbfd0;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        margin-bottom: 35px;
        background: #fff;
      }

      .image-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .social-row {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .button {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 24px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      }

      .button:hover {
        transform: translateY(-4px) scale(1.04);
      }

      .instagram {
        background: linear-gradient(45deg, #fd1d1d, #e1306c, #c13584, #833ab4);
        color: white;
      }

      .review {
        background: white;
        color: #db5e87;
        border: 2px solid #ffd2df;
      }

      .footer {
        margin-top: 30px;
        color: #9b6d79;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Sarah Skinsational</h1>
      <div class="subtitle">Glow • Elevate • Radiate</div>

      <div class="image-box">
        <img
          src="./images/F1854DA1-6AAA-4E83-8887-3A2F58FAAACC.jpeg"
          alt="Sarah Image"
        />
      </div>

      <div class="social-row">
        <a
          class="button instagram"
          href="https://www.instagram.com/sarahskinsational?igsh=MWlnYzl6OHphY3doYw%3D%3D&utm_source=qr"
          target="_blank"
        >
          <i class="fab fa-instagram"></i>
          <span>Instagram</span>
        </a>

        <a
          class="button review"
          href="https://share.google/Ytnqse5gKYGPXCGHt
"
          target="_blank"
        >
          <i class="fab fa-google"></i>
          <span>Review Us</span>
        </a>
      </div>

      <div class="footer">Luxury skincare • Beauty • Confidence ✨</div>
    </div>
  </body>
</html>
